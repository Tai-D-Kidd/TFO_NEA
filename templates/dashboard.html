<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Maps</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

    <div class="wrapper">

        <h1>Welcome, {{ user.username }}</h1>

        <div class="card">
            <h2>Your Maps</h2>
            <ul>
                {% for m in current_maps %}
                    <li>
                        <span>{{ m.map_name }}</span>
                        <a href="{{ url_for('map_view', map_id=m.id) }}">Open</a>
                    </li>
                {% else %}
                    <li>You are not in any maps yet.</li>
                {% endfor %}
            </ul>
        </div>

        <div class="card">
            <h2>Create a New Map</h2>
            <form method="POST" id="createMapForm">
                <input type="text" name="map_name" placeholder="Map Name" required>
                <input type="hidden" name="map_center_lat" id="map_center_lat" value="{{ user.latitude }}">
                <input type="hidden" name="map_center_lon" id="map_center_lon" value="{{ user.longitude }}">
                <p id="location-status">Getting your location...</p>
                <button type="submit" id="createBtn">Create Map</button>
            </form>
        </div>

        <div class="card">
            <h2>Join Existing Maps</h2>
            <form method="POST">
                <select name="join_map_id">
                    {% for m in available_maps %}
                        <option value="{{ m.id }}">{{ m.map_name }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Join Map</button>
            </form>
        </div>

    </div>

    <script>
        // Get user's current location when page loads
        const locationStatus = document.getElementById('location-status');
        const latInput = document.getElementById('map_center_lat');
        const lonInput = document.getElementById('map_center_lon');
        const createBtn = document.getElementById('createBtn');

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    latInput.value = lat;
                    lonInput.value = lon;
                    
                    locationStatus.textContent = `Map will be centered at your current location`;
                    locationStatus.style.color = '#4CAF50';
                    
                    // Update user's location in database
                    fetch('/update_location', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            latitude: lat,
                            longitude: lon
                        })
                    });
                },
                error => {
                    console.error("Error getting location:", error);
                    locationStatus.textContent = `Using default location (enable location access for better experience)`;
                    locationStatus.style.color = '#ff9800';
                    
                    // Use database location as backup
                    const dbLat = {{ user.latitude }};
                    const dbLon = {{ user.longitude }};
                    
                    if (dbLat !== 0 && dbLon !== 0) {
                        latInput.value = dbLat;
                        lonInput.value = dbLon;
                    } else {
                        // All roads lead to Rome ... or London 
                        latInput.value = 51.5074;  // London coords
                        lonInput.value = -0.1278;
                    }
                },
                {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                }
            );
        } else {
            locationStatus.textContent = "Geolocation not supported";
            locationStatus.style.color = '#f44336';
        }
    </script>

</body>
</html>
