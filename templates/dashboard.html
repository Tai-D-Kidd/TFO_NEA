<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Maps</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            background: #e0e5ec;
            color: #444;
        }

        .wrapper {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
        }

        .card {
            background: #e0e5ec;
            padding: 30px;
            border-radius: 25px;
            box-shadow:
                10px 10px 20px #b8bec7,
                -10px -10px 20px #ffffff;
            margin-bottom: 40px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #e0e5ec;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 15px;
            box-shadow: inset 6px 6px 12px #b8bec7,
                        inset -6px -6px 12px #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a {
            color: #5c7cfa;
            text-decoration: none;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, select {
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: #e0e5ec;
            box-shadow: inset 6px 6px 12px #b8bec7,
                        inset -6px -6px 12px #ffffff;
            font-size: 15px;
            outline: none;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: #e0e5ec;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            box-shadow:
                6px 6px 12px #b8bec7,
                -6px -6px 12px #ffffff;
            transition: 0.15s ease-in-out;
        }

        button:active {
            box-shadow: inset 6px 6px 12px #b8bec7,
                        inset -6px -6px 12px #ffffff;
        }

    </style>
</head>
<body>

    <div class="wrapper">

        <h1>Welcome, {{ user.username }}</h1>

        <div class="card">
            <h2>Your Maps</h2>
            <ul>
                {% for m in current_maps %}
                    <li>
                        <span>{{ m.map_name }}</span>
                        <a href="{{ url_for('map_view', map_id=m.id) }}">Open</a>
                    </li>
                {% else %}
                    <li>You are not in any maps yet.</li>
                {% endfor %}
            </ul>
        </div>

        <div class="card">
            <h2>Create a New Map</h2>
            <form method="POST">
                <input type="text" name="map_name" placeholder="Map Name" required>
                <input type="number" step="any" name="map_center_lat" placeholder="Center Latitude">
                <input type="number" step="any" name="map_center_lon" placeholder="Center Longitude">
                <button type="submit">Create Map</button>
            </form>
        </div>

        <div class="card">
            <h2>Join Existing Maps</h2>
            <form method="POST">
                <select name="join_map_id">
                    {% for m in available_maps %}
                        <option value="{{ m.id }}">{{ m.map_name }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Join Map</button>
            </form>
        </div>

    </div>

</body>
</html>
