<!DOCTYPE html>
<html lang="en">
<head>
    <title>Proto4web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='map_view.css') }}">
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body>
  <div class="container">
    <!-- MAP -->
    <div class="panel">
        <h2>{{ map_data.map_name }}</h2>
        <div id="map"></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="panel">
        <h2>Leaderboard</h2>
        <ul id="leaderboard">
            {% for row in leaderboard %}
                <li>
                    <span class="color-dot" style="background: {{ row.user_color }}"></span>
                    {{ row.username }} - {{ row.user_score|round(0) }}
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
    

  



  <script>
    let friendMarkers = [];
    const mapID = {{ map_data.id }};
    const startLat = {{ user.latitude|default(0, true) }};
    const startLon = {{ user.longitude|default(0, true) }};
    let currentLat = startLat;
    let currentLon = startLon;
    const userId = {{ session['user_id'] }};
    const friends = {{ friends|tojson }};
    const territories = {{ territories|tojson }};
    let scores = {};

    {% for row in leaderboard %}
        scores["{{ row.username }}"] = {{ row.user_score }};
    {% endfor %}

    const map = L.map('map').setView([startLat, startLon], 13);
    const socket = io();
    
    
    socket.emit('join_map', { map_id: mapID });


    // Add Map layer on top 
    L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.{ext}', {
	minZoom: 0,
	maxZoom: 20,
	attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
	ext: 'png'
    }).addTo(map);
// game stuff
    
    // existing territories
    territories.forEach(t => {
        L.polygon(t.coordinates, {
            color: t.color,
            fillColor: t.color,
            fillOpacity: 0.7
        }).addTo(map);
    });

    // Add user's marker
    const ucolor = "{{ user.user_color }}";

    userMarker = L.circleMarker(
        [startLat, startLon],
        { title: "You ({{ user.username }})", radius: 10, color: ucolor, fillColor: ucolor, fillOpacity: 0.8 })
        .addTo(map)
        .bindPopup("You ({{ user.username }})")
        .openPopup();
    
    
    // friends markers
    friends.forEach(friend => {
        
        const fLat = friend.latitude;
        const fLon = friend.longitude;
        const fcolor = friend.user_color;
        const isOnline = friend.is_online;
        
        if (fLat !== 0 && fLon !== 0) {
        const marker = L.circleMarker(
            [fLat, fLon],
            { 
                radius: 8, 
                color: fcolor, 
                fillColor: fcolor, 
                fillOpacity: isOnline ? 0.8 : 0.3  // Dim if offline
            }
        ).addTo(map).bindPopup(friend.username + (isOnline ? " 🟢" : " 🔴"));

        friendMarkers.push({ id: friend.id, marker, username: friend.username } );
        }
    });

    


    // trails
    let trailPoints = [];
    let trailLine = null;
    


function updateTrail(lat, lon) {
        trailPoints.push([lat, lon]);

        if (trailLine) map.removeLayer(trailLine);

        trailLine = L.polyline(trailPoints, {
            color: ucolor,
            weight: 4,
            className: "trail"
        }).addTo(map);

        // loop detction moved to backend
    }



function updateLeaderboard() {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .forEach(([name, score]) => {
            const li = document.createElement("li");
            li.innerHTML = `<span>${name}</span><span>${score.toFixed(0)}</span>`;
            list.appendChild(li);
        });
}

// SEND ME THE LOCATION 

function handlePosition(lat, lon) {
    
    currentLat = lat;
    currentLon = lon;
    userMarker.setLatLng([lat, lon]);
    updateTrail(lat, lon);

    socket.emit("update_location", {
        map_id: mapID,
        user_id: userId,
        latitude: lat,
        longitude: lon
    });
}
    
// simulated movenent
const radius = 0.002;     
const steps = 72;        
let step = 0;
let movementInterval = null;
let simulationEnabled = false;
let simCenterLat = null;
let simCenterLon = null;
let simStartAngle = 0;


function simulateCircularMovement() {
    if (step > steps) {
        clearInterval(movementInterval);
        movementInterval = null;
        step = 0;
        return;
    }

    const angle = simStartAngle + (step / steps) * 2 * Math.PI;

    let lat = simCenterLat + radius * Math.cos(angle);
    let lon = simCenterLon + radius * Math.sin(angle);

    handlePosition(lat, lon);
    step++; // +=1 in js
}


document.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "s") {
        simulationEnabled = !simulationEnabled;

        if (simulationEnabled) {
            console.log("🟢 Simulation ON");
            const startAngle = 0;
            simCenterLat = currentLat - radius * Math.cos(startAngle);
            simCenterLon = currentLon - radius * Math.sin(startAngle);
            simStartAngle = startAngle;

            step = 0;
            movementInterval = setInterval(simulateCircularMovement, 400);
        } else {
            console.log("🔴 Simulation OFF");
            clearInterval(movementInterval);
            movementInterval = null;
        }
    }
});

// GPS tracking
let watchId = null;

if ("geolocation" in navigator) {
    watchId = navigator.geolocation.watchPosition(
        pos => {
            if (simulationEnabled) return;

            handlePosition(
                pos.coords.latitude,
                pos.coords.longitude
            );
        },
        err => console.error("GPS error:", err),
        {
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 10000
        }
    );
}
    

    
    
        

    
    
    
   ////////////// socket eventss

    socket.on("player_moved", data => {
        const friend = friendMarkers.find(f => f.id === data.user_id);
        if (friend) {
            friend.marker.setLatLng([data.lat, data.lon]);
        }
    });

    socket.on("new_territory", data => {
        L.polygon(data.coordinates, {
            color: data.color,
            fillColor: data.color,
            fillOpacity: 0.8
        }).addTo(map);
    });
    socket.on("clear_trail", data => {
        
        if (data.user_id === userId) {
            trailPoints = [];
            if (trailLine) {
                map.removeLayer(trailLine);
                trailLine = null;
            }
        }
    });


    socket.on("score_updated", data => {
    scores[data.username] = data.new_score;
    updateLeaderboard();
});



  </script>
</html>
