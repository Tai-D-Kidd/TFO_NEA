<!DOCTYPE html>
<html lang="en">
<head>
    <title>Proto4web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='map_view.css') }}">
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body>
  <div class="container">
    <!-- MAP -->
    <div class="panel">
        <h2>{{ map_data.map_name }}</h2>
        <div id="map"></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="panel">
        <h2>Leaderboard</h2>
        <ul id="leaderboard">
            {% for row in leaderboard %}
                <li>
                    <span class="color-dot" style="background: {{ row.user_color }}"></span>
                    {{ row.username }} - {{ row.user_score|round(0) }}
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
    

  



  <script>
    let friendMarkers = [];
    let trailPoints = [];
    const mapID = {{ map_data.id }};
    const startLat = {{ user.latitude|default(0, true) }};
    const startLon = {{ user.longitude|default(0, true) }};
    let currentLat = startLat;
    let currentLon = startLon;
    const userId = {{ session['user_id'] }};
    const friends = {{ friends|tojson }};
    const territories = {{ territories|tojson }};
    const trails = {{ trails|tojson }};
    let scores = {};
    const ucolor = "{{ user.user_color }}";
    let trailLine = null;
    let friendTrails = {};

    {% for row in leaderboard %}
        scores["{{ row.username }}"] = {{ row.user_score }};
    {% endfor %}

    const map = L.map('map').setView([startLat, startLon], 13);
    const socket = io();
    
    
    socket.emit('join_map', { map_id: mapID });


    // Add Map layer on top 
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
    }).addTo(map);
// game stuff
    
    // existing territories
    territories.forEach(t => {
        L.polygon(t.coordinates, {
            color: t.color,
            fillColor: t.color,
            fillOpacity: 0.7
        }).addTo(map);
    });
    // existing trails
    trails.forEach(t => {
    if (t.user_id === userId) {
        // Your trail
        console.log("Loading your trail");
        trailPoints = t.coordinates;
        if (trailPoints.length > 0) {
            trailLine = L.polyline(trailPoints, {
                color: ucolor,
                weight: 4,
                className: "trail"
            }).addTo(map);
        }
    } else {
        // Other players' trails
        if (t.coordinates.length > 0) {
            friendTrails[t.user_id] = L.polyline(t.coordinates, {
                color: t.color,
                weight: 3,
                opacity: 0.6,
                className: "friend-trail"
            }).addTo(map);
        }
    }
});
    // Add user's marker
    

    userMarker = L.circleMarker(
        [startLat, startLon],
        { title: "You ({{ user.username }})", radius: 10, color: ucolor, fillColor: ucolor, fillOpacity: 0.8 })
        .addTo(map)
        .bindPopup("You ({{ user.username }})")
        .openPopup();
    
    
    // friends markers
    friends.forEach(friend => {
        
        const fLat = friend.latitude;
        const fLon = friend.longitude;
        const fcolor = friend.user_color;
        const isOnline = friend.is_online;
        
        if (fLat !== 0 && fLon !== 0) {
        const marker = L.circleMarker(
            [fLat, fLon],
            { 
                radius: 8, 
                color: fcolor, 
                fillColor: fcolor, 
                fillOpacity: isOnline ? 0.8 : 0.3  // Dim if offline
            }
        ).addTo(map).bindPopup(friend.username + (isOnline ? " (ON)" : " (OFF)"));

        friendMarkers.push({ id: friend.id, marker, username: friend.username } );
        }
    });

    


    // trails
    
    

    friends.forEach(friend => {
        friendTrails[friend.id] = null;
    });


function updateTrail(lat, lon) {
        trailPoints.push([lat, lon]);

        if (trailLine) map.removeLayer(trailLine);

        trailLine = L.polyline(trailPoints, {
            color: ucolor,
            weight: 4,
            className: "trail"
        }).addTo(map);

        // loop detction moved to backend
    }



function updateLeaderboard() {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .forEach(([name, score]) => {
            const li = document.createElement("li");
            li.innerHTML = `<span>${name}</span><span>${score.toFixed(0)}</span>`;
            list.appendChild(li);
        });
}

// SEND ME THE LOCATION 


// fake move for testing 
function handlePosition(lat, lon) {
    
    currentLat = lat;
    currentLon = lon;
    userMarker.setLatLng([lat, lon]);
    updateTrail(lat, lon);

    socket.emit("update_location", {
        map_id: mapID,
        user_id: userId,
        latitude: lat,
        longitude: lon
    });
}
    
let arrowKeyMode = false;
const moveStep = 0.0001;  
let realGPSLat = startLat;  // Store real GPS position
let realGPSLon = startLon;

function enableArrowKeyMode() {
    arrowKeyMode = !arrowKeyMode;
    
    const indicator = document.getElementById('arrow-mode-indicator');
    if (arrowKeyMode) {
        console.log("Arrow key mode ON");
        indicator.style.display = 'block';
        indicator.textContent = 'Test Mode: Use Arrow Keys';
        indicator.style.background = '#4CAF50';
    } else {
        console.log("GPS mode ON");
        indicator.style.display = 'block';
        indicator.textContent = 'GPS Mode: Real Location';
        indicator.style.background = '#2196F3';
        
        // Return to real GPS position
        if (realGPSLat !== 0 && realGPSLon !== 0) {
            handlePosition(realGPSLat, realGPSLon);
        }
        // leave aafter 2s
        setTimeout(() => {
            indicator.style.display = 'none';
        }, 2000);
    }
}

document.addEventListener("keydown", e => {
    // Toggle mode with 'T' key (Test mode)
    if (e.key.toLowerCase() === "t") {
        enableArrowKeyMode();
        return;
    }
    
    // Arrow key movement
    if (arrowKeyMode) {
        let newLat = currentLat;
        let newLon = currentLon;
        
        switch(e.key) {
            case "ArrowUp":
                newLat += moveStep;
                e.preventDefault();
                break;
            case "ArrowDown":
                newLat -= moveStep;
                e.preventDefault();
                break;
            case "ArrowLeft":
                newLon -= moveStep;
                e.preventDefault();
                break;
            case "ArrowRight":
                newLon += moveStep;
                e.preventDefault();
                break;
            default:
                return;
        }
        
        handlePosition(newLat, newLon);
    }
});


// GPS tracking
let watchId = null;

if ("geolocation" in navigator) {
    watchId = navigator.geolocation.watchPosition(
        pos => {
            if (arrowKeyMode) return;

            handlePosition(
                pos.coords.latitude,
                pos.coords.longitude
            );
        },
        err => console.error("GPS error:", err),
        {
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 10000
        }
    );
}
    
    
    
   ////////////// socket eventss

    socket.on("player_moved", data => {
        const friend = friendMarkers.find(f => f.id === data.user_id);
        if (friend) {
            friend.marker.setLatLng([data.lat, data.lon]);

            // Updating their trail
            if (data.trail && data.trail.length > 0) {
            // Remove old trail
            if (friendTrails[data.user_id]) {
                map.removeLayer(friendTrails[data.user_id]);
            }
            
            // coloour for friend
            const friendData = friends.find(f => f.id === data.user_id);
            const friendColor = friendData ? friendData.user_color : '#FFFFFF';
            
            // Draw new trail
            friendTrails[data.user_id] = L.polyline(data.trail, {
                color: friendColor,
                weight: 3,
                opacity: 0.6,
                className: "friend-trail"
            }).addTo(map);
        }
        }
    });

    socket.on("trail_broken", data => {
    if (data.broken_user_id === userId) {
        // Your trail was broken!
        alert("Your trail was broken by another player!");
        trailPoints = [];
        if (trailLine) {
            map.removeLayer(trailLine);
            trailLine = null;
        }
    } else {
        // Someone else's trail was broken
        if (friendTrails[data.broken_user_id]) {
            map.removeLayer(friendTrails[data.broken_user_id]);
            friendTrails[data.broken_user_id] = null;
        }
    }
});

    socket.on("new_territory", data => {
        L.polygon(data.coordinates, {
            color: data.color,
            fillColor: data.color,
            fillOpacity: 0.8
        }).addTo(map);
    });
    socket.on("clear_trail", data => {
        
        if (data.user_id === userId) {
            trailPoints = [];
            if (trailLine) {
                map.removeLayer(trailLine);
                trailLine = null;
            }
        } else {
        // Clear friend's trail
            if (friendTrails[data.user_id]) {
                map.removeLayer(friendTrails[data.user_id]);
                friendTrails[data.user_id] = null;
            }
    }
    });


    socket.on("score_updated", data => {
    scores[data.username] = data.new_score;
    updateLeaderboard();
});



  </script>
</html>
