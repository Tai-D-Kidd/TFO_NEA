<!DOCTYPE html>
<html lang="en">
<head>
    <title>Proto4web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='map_view.css') }}">
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body>
  <div class="container">
    <!-- MAP -->
    <div class="panel">
        <h2>{{ map_data.map_name }}</h2>
        <div id="map"></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="panel">
        <h2>Leaderboard</h2>
        <ul id="leaderboard">
            {% for row in leaderboard %}
                <li>
                    <span class="color-dot" style="background: {{ row.user_colour }}"></span>
                    {{ row.username }} - {{ row.user_score|round(0) }}
                </li>
            {% endfor %}
        </ul>
    </div>
</div>

  



  <script>
    let friendMarkers = [];
    const mapID = {{ map_data.id }};
    const startLat = {{ user.latitude|default(0, true) }};
    const startLon = {{ user.longitude|default(0, true) }};
    const friends = {{ friends|tojson }};
    const territories = {{ territories|tojson }};
    let scores = {};

    {% for row in leaderboard %}
        scores["{{ row.username }}"] = {{ row.user_score }};
    {% endfor %}

    const map = L.map('map').setView([startLat, startLon], 13);
    const socket = io();
    
    socket.emit('join_map', { map_id: mapID });


    // Add Map layer on top 
    L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.{ext}', {
	minZoom: 0,
	maxZoom: 20,
	attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
	ext: 'png'
    }).addTo(map);
// game stuff
    
    
    // Add user's marker
    const uColor = 'blue'; // place holder until user can choose color

    userMarker = L.circleMarker(
        [startLat, startLon],
        { title: "You ({{ user.username }})", radius: 8, color: uColor, fillColor: uColor, fillOpacity: 0.8 })
        .addTo(map)
        .bindPopup("You ({{ user.username }})")
        .openPopup();
    
    
    // friends markers
    friends.forEach(friend => {
        
        const fLat = friend.latitude;
        const fLon = friend.longitude;
        const fColor = friend.user_colour;
        
        if (fLat !== 0 && fLon !== 0) {
            const marker = L.circleMarker(
                [fLat, fLon],
                { radius: 8, color: fColor, fillColor: fColor, fillOpacity: 0.8 }
            ).addTo(map).bindPopup(friend.username);

            friendMarkers.push({ id: friend.id, marker });
        }
    });

    // existing territories
    territories.forEach(t => {
        L.polygon(t.coordinatess, {
            color: "#"+(t.user_id*1234567 % 0xFFFFFF).toString(16).padStart(6, "0"),
            fillColor: "#"+(t.user_id*1234567 % 0xFFFFFF).toString(16).padStart(6, "0"),
            fillOpacity: 0.6
        }).addTo(map);
    });


    // trails
    let trailPoints = [];
    let trailLine = null;
    

    function updateTrail(lat, lon) {
        trailPoints.push([lat, lon]);

        if (trailLine) map.removeLayer(trailLine);

        trailLine = L.polyline(trailPoints, {
            color: uColor,
            weight: 4,
            className: "trail"
        }).addTo(map);

        // Close loop -> territory -> points
        if (trailPoints.length > 10 && map.distance(trailPoints[0], [lat, lon]) < 10) {

            const polygon = L.polygon(trailPoints, {
                color: uColor,
                fillColor: uColor,
                fillOpacity: 0.67
            }).addTo(map);
            
            const area = polygonArea(trailPoints);
            

            socket.emit("territory_created", {
                map_id: mapID,
                coordinates: trailPoints.slice(),
                
            });

            trailPoints = [];
            map.removeLayer(trailLine);
            trailLine = null;
        }
    }


function polygonArea(coordinates) {
    let area = 0;
    for (let i = 0; i < coordinates.length; i++) {
        const [x1, y1] = coordinates[i];
        const [x2, y2] = coordinates[(i + 1) % coordinates.length];
        area += x1 * y2 - x2 * y1;
    }
    return Math.abs(area / 2);
}

function updateLeaderboard() {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .forEach(([name, score]) => {
            const li = document.createElement("li");
            li.innerHTML = `<span>${name}</span><span>${score.toFixed(0)}</span>`;
            list.appendChild(li);
        });
}
    
        

    // getting and updating location 
    // --- TEST SIMULATION: User moving in a circle ---
    const radius = 0.001;
const steps = 60;
let step = 0;

function simulateCircularMovement() {
    const angle = (step / steps) * 2 * Math.PI;
    const lat = startLat + radius * Math.cos(angle);
    const lon = startLon + radius * Math.sin(angle);

    // Move the user marker
    userMarker.setLatLng([lat, lon]);

    // Update trail
    updateTrail(lat, lon);

    // Emit location
    socket.emit("update_location", {
        map_id: mapID,
        latitude: lat,
        longitude: lon
    });

    step = (step + 1) % steps; // increment step

    // Only close loop when a full circle is complete
    if (step === 0 && trailPoints.length > 0) {
        socket.emit("territory_created", { map_id: mapID, coordinates: trailPoints.slice() });
        trailPoints = [];
        if (trailLine) {
            map.removeLayer(trailLine);
            trailLine = null;
        }
    }
}

// Run every 500ms
setInterval(simulateCircularMovement, 500);
    
    
   // socket eventss
    socket.on("player_moved", data => {
        const friend = friendMarkers.find(f => f.id === data.user_id);
        if (friend) {
            friend.marker.setLatLng([data.lat, data.lon]);
        }
    });

    socket.on("new_territory", data => {
        L.polygon(data.coordinates, {
            color: data.color,
            fillColor: data.color,
            fillOpacity: 0.7
        }).addTo(map);
    });
   updateLeaderboard()

    socket.on("score_updated", data => {
    scores[data.username] = data.new_score;
    updateLeaderboard();
});



  </script>
</html>
