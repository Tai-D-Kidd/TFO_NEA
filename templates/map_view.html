<!DOCTYPE html>
<html lang="en">
<head>
    <title>Proto4web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<style>
  
  #map {height: 80vh;}
</style>
<body>
  <h1>{{ map_data.map_name }}</h1>
  <div id="map"></div>
  



  <script>
    let friendMarkers = [];
    const startLat = {{ user.latitude|default(0, true) }};
    const startLon = {{ user.longitude|default(0, true) }};
    const map = L.map('map').setView([startLat, startLon], 13);
    
    // Add OpenStreetMap layer on top c+v
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Add user's marker
    userMarker = L.marker([startLat, startLon], { title: "You ({{ user.username }})" })
        .addTo(map)
        .bindPopup("You ({{ user.username }})")
        .openPopup();
    
    const friends = {{ friends|tojson }};
    console.log(friends); 
    console.log(friends.length);
    friends.forEach(friend => {
        const fLat = friend.latitude;
        const fLon = friend.longitude;
        const hexColor = friend.user_colour
        if (fLat !== 0 && fLon !== 0) {
            const userIcon = L.divIcon({
            html: `<div style="background-color:${hexColor};width:16px;height:16px;border-radius:50%;border:2px solid white;"></div>`,
            className: '',
            iconSize: [16,16]
        });
            const marker = L.marker([fLat, fLon],{icon: userIcon}, { title: friend.username })
                .addTo(map)
                .bindPopup(friend.username);
            friendMarkers.push(marker);
        }
    });

    getLocationAndUpdate();
    setInterval(getLocationAndUpdate, 10000); // every 10s
        

    // getting and updating location 
    function getLocationAndUpdate() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    // Move the user marker
                    userMarker.setLatLng([lat, lon]);
                    

                    //  new position to Flask backend
                    fetch('/update_location', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ latitude: lat, longitude: lon })
                    });
                },
                err => {
                    console.error("Error getting location:", err);
                    alert("Could not get your location. Check browser permissions.");
                }
            );
        } else {
            alert("Geolocation is not supported by your browser.");
        }
    }
    
    
    
   
  </script>
</html>
